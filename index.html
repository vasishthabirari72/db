<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0f1117"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>GramSync</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>

<!-- ── SPLASH ── -->
<div id="splash" class="splash">
  <div class="splash-inner">
    <div class="splash-logo">
      <span class="logo-gram">Gram</span><span class="logo-sync">Sync</span>
    </div>
    <p class="splash-tagline">तरक्की का नया खाता</p>
    <div class="splash-loader">
      <div class="splash-bar"></div>
    </div>
  </div>
</div>

<!-- ── AUTH SCREEN ── -->
<div id="screen-auth" class="screen hidden">
  <div class="auth-wrap">
    <div class="auth-logo">
      <span class="logo-gram">gram</span><span class="logo-sync">sync</span>
    </div>
    <p class="auth-sub">Digital ledger for your shop</p>

    <div id="auth-step-phone" class="auth-card">
      <label class="field-label">Mobile number</label>
      <div class="phone-row">
        <span class="phone-code">+91</span>
        <input id="phone-input" type="tel" inputmode="numeric" maxlength="10"
               placeholder="98765 43210" class="phone-field" autocomplete="tel"/>
      </div>
      <button id="btn-send-otp" class="btn-primary" onclick="sendOTP()">
        Get OTP →
      </button>
    </div>

    <div id="auth-step-otp" class="auth-card hidden">
      <label class="field-label">Enter 6-digit OTP</label>
      <div class="otp-row" id="otp-boxes">
        <input class="otp-box" type="tel" inputmode="numeric" maxlength="1"/>
        <input class="otp-box" type="tel" inputmode="numeric" maxlength="1"/>
        <input class="otp-box" type="tel" inputmode="numeric" maxlength="1"/>
        <input class="otp-box" type="tel" inputmode="numeric" maxlength="1"/>
        <input class="otp-box" type="tel" inputmode="numeric" maxlength="1"/>
        <input class="otp-box" type="tel" inputmode="numeric" maxlength="1"/>
      </div>
      <p class="otp-hint">Sent to +91 <span id="otp-phone-display"></span></p>
      <button id="btn-verify-otp" class="btn-primary" onclick="verifyOTP()">
        Verify & Login →
      </button>
    </div>

    <p class="auth-offline-note">
      <span class="dot-offline"></span> Works offline — your data stays on this device
    </p>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="screen-app" class="screen hidden">

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <span class="logo-gram">gram</span><span class="logo-sync">sync</span>
    </div>
    <div class="header-center">
      <span id="header-sync-status" class="sync-pill sync-pending">● syncing</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="openCustomerList()" title="Customers">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </button>
      <button class="icon-btn" onclick="openLedger()" title="Ledger">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </button>
    </div>
  </header>

  <!-- POS KEYPAD VIEW -->
  <div id="view-pos" class="view active">

    <!-- Amount display -->
    <div class="amount-display">
      <div class="amount-currency">₹</div>
      <div id="amount-value" class="amount-value">0</div>
    </div>

    <!-- Customer bar -->
    <div id="customer-bar" class="customer-bar" onclick="openCustomerPicker()">
      <div id="customer-bar-inner" class="customer-bar-none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Tap to select customer
      </div>
    </div>

    <!-- Keypad -->
    <div class="keypad">
      <button class="key" data-val="1" onclick="keyPress('1')">1</button>
      <button class="key" data-val="2" onclick="keyPress('2')">2</button>
      <button class="key" data-val="3" onclick="keyPress('3')">3</button>
      <button class="key" data-val="4" onclick="keyPress('4')">4</button>
      <button class="key" data-val="5" onclick="keyPress('5')">5</button>
      <button class="key" data-val="6" onclick="keyPress('6')">6</button>
      <button class="key" data-val="7" onclick="keyPress('7')">7</button>
      <button class="key" data-val="8" onclick="keyPress('8')">8</button>
      <button class="key" data-val="9" onclick="keyPress('9')">9</button>
      <button class="key key-wide" onclick="keyPress('00')">00</button>
      <button class="key" onclick="keyPress('0')">0</button>
      <button class="key key-del" onclick="keyDel()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
      </button>
    </div>

    <!-- Action buttons -->
    <div class="action-row">
      <button class="btn-udhar" onclick="commitTransaction('udhar')">
        <span class="btn-label-hi">उधार</span>
        <span class="btn-label-en">CREDIT</span>
      </button>
      <button class="btn-jama" onclick="commitTransaction('jama')">
        <span class="btn-label-hi">जमा</span>
        <span class="btn-label-en">PAYMENT</span>
      </button>
    </div>

  </div>

  <!-- CUSTOMER LIST VIEW -->
  <div id="view-customers" class="view hidden">
    <div class="view-header">
      <button class="back-btn" onclick="showView('pos')">← Back</button>
      <h2 class="view-title">Customers</h2>
      <button class="icon-btn" onclick="openAddCustomer()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="search-bar-wrap">
      <input id="customer-search" type="text" placeholder="Search by name or phone…" class="search-bar" oninput="filterCustomers(this.value)"/>
    </div>
    <div id="customer-list" class="customer-list"></div>
  </div>

  <!-- LEDGER VIEW -->
  <div id="view-ledger" class="view hidden">
    <div class="view-header">
      <button class="back-btn" onclick="showView('pos')">← Back</button>
      <h2 class="view-title" id="ledger-title">Ledger</h2>
    </div>
    <div id="ledger-summary" class="ledger-summary"></div>
    <div id="ledger-list" class="ledger-list"></div>
  </div>

</div>

<!-- ── MODALS ── -->

<!-- Customer Picker Modal -->
<div id="modal-customer-picker" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 class="modal-title">Select Customer</h3>
    <div class="search-bar-wrap">
      <input id="picker-search" type="text" placeholder="Search or scan QR…" class="search-bar" oninput="filterPicker(this.value)" autofocus/>
    </div>
    <div class="modal-action-row">
      <button class="modal-action-btn" onclick="startQRScan()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>
        Scan QR Card
      </button>
      <button class="modal-action-btn" onclick="openAddCustomer()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Customer
      </button>
    </div>
    <div id="picker-list" class="customer-list modal-list"></div>
    <button class="modal-cancel" onclick="closeModal('modal-customer-picker')">Cancel</button>
  </div>
</div>

<!-- Add Customer Modal -->
<div id="modal-add-customer" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 class="modal-title">New Customer</h3>
    <div class="form-group">
      <label class="field-label">Name</label>
      <input id="new-customer-name" type="text" placeholder="Ram Kumar" class="text-field"/>
    </div>
    <div class="form-group">
      <label class="field-label">Mobile (optional)</label>
      <input id="new-customer-phone" type="tel" inputmode="numeric" placeholder="98765 43210" class="text-field"/>
    </div>
    <div class="form-group">
      <label class="field-label">Credit limit (₹)</label>
      <input id="new-customer-limit" type="number" inputmode="numeric" placeholder="500" value="500" class="text-field"/>
    </div>
    <button class="btn-primary" onclick="saveNewCustomer()">Save Customer</button>
    <button class="modal-cancel" onclick="closeModal('modal-add-customer')">Cancel</button>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<!-- QR Scanner overlay -->
<div id="qr-overlay" class="qr-overlay hidden">
  <div class="qr-inner">
    <p class="qr-label">Scan customer QR card</p>
    <div class="qr-frame">
      <div class="qr-corner qr-tl"></div>
      <div class="qr-corner qr-tr"></div>
      <div class="qr-corner qr-bl"></div>
      <div class="qr-corner qr-br"></div>
      <div class="qr-scan-line"></div>
    </div>
    <button class="qr-cancel" onclick="stopQRScan()">Cancel</button>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/sync.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
