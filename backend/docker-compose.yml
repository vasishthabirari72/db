version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     gramsync
      POSTGRES_PASSWORD: gramsync
      POSTGRES_DB:       gramsync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV:           production
      PORT:               3000
      DATABASE_URL:       postgresql://gramsync:gramsync@postgres:5432/gramsync
      REDIS_URL:          redis://redis:6379
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS:       ${CORS_ORIGINS}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pgdata:
  redisdata: